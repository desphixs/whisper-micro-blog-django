<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In to Authify</title>
    <!-- We load Tailwind CSS CDN to style our page with utility classes without writing custom CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- We load Font Awesome CDN for highly descriptive icons like envelopes, users, and locks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- We load a beautiful, modern Google Font called Plus Jakarta Sans for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Setting the default font to Plus Jakarta Sans for the entire page */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="h-full bg-zinc-50 text-zinc-900 flex items-center justify-center p-4 relative overflow-hidden select-none">

    <!-- Main login card container -->
    <div
        class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-zinc-200/80 rounded-2xl p-8 shadow-xl relative z-10">
        <!-- Brand Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-zinc-900 rounded-xl mb-3 shadow-sm">
                <i class="fa-solid fa-lock text-white text-xl"></i>
            </div>
            <h1
                class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-zinc-950 to-zinc-700 bg-clip-text text-transparent">
                Welcome Back
            </h1>
            <p class="text-zinc-500 text-sm mt-1.5 font-medium">Verify your identity to enter your dashboard.</p>
        </div>

        <!-- Dynamic Error Alert box: Rendered only if Django views pass an error string -->
        {% if error %}
        <div
            class="mb-6 p-4 bg-red-50 border border-red-200/60 rounded-xl flex items-start space-x-3 text-red-800 text-sm animate-shake">
            <i class="fa-solid fa-circle-exclamation mt-0.5 text-red-500"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Login Form -->
        <!-- We use the POST method to transmit user credentials securely, keeping them hidden inside the request envelope -->
        <form method="POST" action="" class="space-y-5">
            <!-- CSRF Token: Django's critical cryptographic guard against Cross-Site Request Forgery attacks -->
            {% csrf_token %}

            <!-- Email Input Field (Acting as USERNAME_FIELD) -->
            <div>
                <label for="email" class="block text-xs font-semibold text-zinc-700 uppercase tracking-wider mb-2">Email
                    Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-400">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required placeholder="name@example.com"
                        class="w-full pl-10 pr-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-zinc-900 placeholder-zinc-400 focus:outline-none focus:border-zinc-900 focus:ring-2 focus:ring-zinc-900/10 transition-all duration-200 text-sm font-medium">
                </div>
            </div>

            <!-- Password Input Field -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="password"
                        class="block text-xs font-semibold text-zinc-700 uppercase tracking-wider">Password</label>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-zinc-900 placeholder-zinc-400 focus:outline-none focus:border-zinc-900 focus:ring-2 focus:ring-zinc-900/10 transition-all duration-200 text-sm font-medium">
                </div>
            </div>

            <!-- Submit Login Button -->
            <button type="submit"
                class="w-full py-3 px-4 mt-2 bg-zinc-900 hover:bg-zinc-800 text-white font-semibold rounded-xl transition-all duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-zinc-950 focus:ring-offset-2 focus:ring-offset-white text-sm">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket ml-2 text-xs"></i>
            </button>
        </form>

        <!-- Redirect to Registration Page Link -->
        <p class="text-center text-zinc-500 text-sm mt-8 font-medium">
            New to Authify?
            <a href="/register/"
                class="text-zinc-900 hover:text-zinc-700 font-semibold transition-colors duration-150 ml-1">Create an
                account</a>
        </p>
    </div>
</body>

</html>
